name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-worker:
    name: 部署 Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        run: npm install

      # 调试：打印目录结构，确认文件存在
      - name: 检查文件结构
        run: |
          echo "=== 根目录 ==="
          ls -la
          echo "=== src 目录 ==="
          ls -la src/ || echo "src 目录不存在！"
          echo "=== wrangler.toml ==="
          cat wrangler.toml

      - name: 部署 Worker 到 Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --var ADMIN_TOKEN:${{ secrets.ADMIN_TOKEN }}

      - name: 上传 index.html 到 R2
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: node scripts/upload-static.js

      - name: 部署完成通知
        run: echo "✅ 部署成功！"
