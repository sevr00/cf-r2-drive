name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:          # 支持手动触发

jobs:
  deploy-worker:
    name: 部署 Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      # ── 部署 Worker ──────────────────────────────────────────
      - name: 部署 Worker 到 Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --var ADMIN_TOKEN:${{ secrets.ADMIN_TOKEN }}

      # ── 上传静态页面到 R2 ────────────────────────────────────
      - name: 上传 index.html 到 R2
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: node scripts/upload-static.js

      - name: 部署完成通知
        run: |
          echo "✅ 部署成功！"
          echo "Worker 已更新，index.html 已上传至 R2"