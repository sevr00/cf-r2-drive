name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-worker:
    name: 部署 Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # 移除 cache: "npm" 这行，避免找不到 lock 文件报错

      - name: 安装依赖
        run: npm install

      - name: 部署 Worker 到 Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --var ADMIN_TOKEN:${{ secrets.ADMIN_TOKEN }}

      - name: 上传 index.html 到 R2
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: node scripts/upload-static.js

      - name: 部署完成通知
        run: echo "✅ 部署成功！Worker 已更新，index.html 已上传至 R2"
